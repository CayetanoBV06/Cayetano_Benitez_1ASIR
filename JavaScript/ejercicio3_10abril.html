<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
        declarar un array con notas y visualizar las notas aprobadas utilizando un switch
        */

        let notas = [5,6,1,3,7]

        function Visualizar(not){
            sw = 0
            num = 0
            while(sw==0){
                if(num==not.length){
                    sw=1;
                }else{
                    if(not[num]>=5){
                    alert(not[num]);
                    
                    }
                    num++;
                }
            }
        }

        Visualizar(notas)
    </script>
</body>
