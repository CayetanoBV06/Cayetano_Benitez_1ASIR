<!DOCTYPE html>
<html>

<head>
    <title>Ejemplo de JavaScript</title>
    <meta charset="UTF-8">
</head>

<body>

    <script>
        function mostrarMensaje() {
            document.write("Cuidado<br>");
            document.write("Ingrese su documento correctamente<br>");
            
        }

        function Visualizar(){
            i=1;
            while (i<=5){
             mostrarMensaje()
                i++;
                if (i == 5){
                document.write("Ultimo mensaje:<br>")
            }
            }
        }
        Visualizar()
    </script>

</body>

</html>
