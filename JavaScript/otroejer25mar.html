<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //un alumno tiene una serie de notas calcular cuantas notas suspensas tiene
     let notas = [3, 7, 1, 7, 8];

    function contar(notas) {
        let contador = 0;
        let i = 0;
        while (i < notas.length) {
            if (notas[i] < 5) {
                contador++;
            }
            i++;
        }
        return contador;
    }

    function Visualizar() {
        document.write("Tiene " + contar(notas) + " suspensas");
    }

    Visualizar();
    </script>
</body>
</html>
