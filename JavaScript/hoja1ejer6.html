<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <script>
        /*
        Dados dos números, visualizar su suma si son iguales y su producto si son diferentes
        */

  let = num1=prompt('Ingrese el primer número:','');  
  let = num1=parseInt(num1);
  let =  num2=prompt('Ingrese el segundo número:','');  
  let = num2=parseInt(num2);
  
  if (num1 == num2){
      suma = num1 + num2;
      alert('La suma es:'+suma);
      
  } else {
     producto = num1 * num2;
      alert('El producto es:'+producto);
  }
    </script>
</body>
</html>
